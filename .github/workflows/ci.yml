name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build / clippy / fmt / test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: Stage Virtual Display Driver + devcon
        # penflow-gui's tauri.conf.json declares vdd/* as bundle resources;
        # Tauri's build.rs validates each resource path exists, even for a
        # plain `cargo build` (not just `cargo tauri build`). Without this
        # step, build.rs errors with: resource path doesn't exist.
        shell: pwsh
        run: ./installer/fetch-vdd.ps1

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace
