name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# When a new commit lands on the same PR / branch, cancel the older run
# in progress. The newer commit supersedes it; saves time + minutes when
# fixing CI typos via rapid-fire pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / clippy / fmt / test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup Node.js
        # Required to build the React frontend dist/ that
        # tauri::generate_context!() validates at compile time.
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/penflow-gui/ui/package-lock.json

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: Stage Virtual Display Driver + devcon
        # penflow-gui's tauri.conf.json declares vdd/* as bundle resources;
        # Tauri's build.rs validates each resource path exists, even for a
        # plain `cargo build` (not just `cargo tauri build`). Without this
        # step, build.rs errors with: resource path doesn't exist.
        shell: pwsh
        run: ./installer/fetch-vdd.ps1

      - name: Stage bundled adb.exe
        # Same validation rule applies to adb/* — tauri.conf.json declares
        # installer/adb/{adb.exe,AdbWin*Api.dll} as resources.
        shell: pwsh
        run: ./installer/fetch-adb.ps1

      - name: Stage VMulti virtual HID digitizer driver
        # Same validation rule for vmulti/* resources (issue #23 fix).
        shell: pwsh
        run: ./installer/fetch-vmulti.ps1

      - name: Install + build frontend
        # tauri::generate_context!() expands at compile time and reads
        # tauri.conf.json, which declares `frontendDist: "../ui/dist"`.
        # The proc macro then verifies that path exists; if it doesn't,
        # it panics with: "The `frontendDist` configuration is set to
        # ... but this path doesn't exist".
        #
        # `cargo build` (and even `cargo check`) don't run Tauri's
        # `beforeBuildCommand` — only `cargo tauri build|dev` does. So
        # for plain workspace builds we have to materialise dist/
        # ourselves before invoking cargo. Same fix applies if you ever
        # run a bare `cargo build -p penflow-gui` locally.
        working-directory: apps/penflow-gui/ui
        run: |
          npm ci
          npm run build

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace
