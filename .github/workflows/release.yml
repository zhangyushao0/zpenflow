name: Release

# Builds the Windows MSI + Android APK and attaches them to a GitHub
# Release. The MSI is the PC server / GUI; the APK is the Android client
# that runs on the Wacom Movink Pad. Both are required for a working
# install, so they ship together.
#
# Triggers:
#   - Pushing a `v*` tag (e.g. `git tag v0.1.0 && git push --tags`)
#     creates a draft release and uploads both artefacts to it.
#   - Manual dispatch from the Actions tab is supported for dry runs;
#     the workflow then only uploads as a workflow artifact (no Release).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Cancel a stale release run when a newer tag is pushed to the same ref
# (e.g. force-retag during recovery). Tags don't normally get reused, so
# this group only fires on the rare manual-dispatch retry.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # required to create / update GitHub Releases

jobs:
  build-msi:
    name: Build MSI (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Tauri 2 builds the bundle into the workspace target/ dir.
          workspaces: ". -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/penflow-gui/ui/package-lock.json

      - name: Install Tauri CLI
        # Use the prebuilt release binary from the tauri-cli GitHub
        # release assets — `cargo install tauri-cli --locked` was
        # spending ~10 minutes building from source on every release
        # (~56% of the entire MSI job's runtime). The action below
        # downloads the matching prebuilt binary in seconds.
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2

      - name: Install frontend deps
        working-directory: apps/penflow-gui/ui
        run: npm ci

      - name: Stage Virtual Display Driver + devcon
        # The MSI bundles MttVDD + devcon.exe under [INSTALLDIR]\vdd\.
        # These are not committed (binary blobs from the upstream VDD
        # release) — fetch-vdd.ps1 downloads + extracts them.
        shell: pwsh
        run: ./installer/fetch-vdd.ps1

      - name: Stage bundled adb.exe
        # The MSI bundles adb.exe + the two AdbWin*Api DLLs under
        # [INSTALLDIR]\adb\ so Penflow runs against its own private
        # platform-tools instead of whatever the user has on PATH.
        # Avoids scoop-shim CreateProcess failures and partial
        # Android Studio installs.
        shell: pwsh
        run: ./installer/fetch-adb.ps1

      - name: Build MSI bundle
        working-directory: apps/penflow-gui
        run: cargo tauri build --bundles msi

      - name: Locate MSI
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem `
            -Path target/release/bundle/msi `
            -Filter "Penflow_*_x64_en-US.msi" `
            -ErrorAction Stop |
            Select-Object -First 1
          if (-not $msi) { throw "MSI not produced — check the build log" }
          "path=$($msi.FullName)"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($msi.Name)"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "size=$($msi.Length)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Built $($msi.Name) ($([math]::Round($msi.Length/1MB,1)) MiB)"

      - name: Upload MSI as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.msi.outputs.name }}
          path: ${{ steps.msi.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach MSI to GitHub Release
        # Only when triggered by a tag push. Manual dispatches stop at
        # the workflow-artifact step above.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.msi.outputs.path }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true

  build-apk:
    name: Build APK (ubuntu-latest)
    runs-on: ubuntu-latest
    # Run after build-msi so we don't race on creating the draft release;
    # softprops/action-gh-release@v2 errors if two jobs both try to
    # create-with-draft. With this dependency the MSI job creates the
    # release and the APK job appends its file.
    needs: build-msi
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        # Android Gradle Plugin 8.5.2 + Kotlin 1.9.24 + jvmTarget=17 in
        # android/app/build.gradle.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build APK
        # We ship the debug-signed APK rather than release: there is no
        # production signing keystore for Penflow yet, and an unsigned
        # release APK can't be installed via `adb install` on Android 14+
        # (INSTALL_PARSE_FAILED_NO_CERTIFICATES). Debug builds install
        # fine — they're signed by the universal Android debug keystore.
        # With `minifyEnabled false` in app/build.gradle, debug and
        # release APKs are otherwise byte-for-byte equivalent for our
        # workload, so the practical difference is just the signature.
        # When a real signing keystore + GitHub secrets exist, switch
        # this step to assembleRelease + a signing config.
        #
        # The chmod is defensive — gradlew should already have +x in git
        # via `git update-index --chmod=+x`, but if a future contributor
        # commits from Windows without core.fileMode set, this keeps the
        # job working.
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --console=plain

      - name: Locate APK
        id: apk
        run: |
          src="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$src" || { echo "APK not found at $src"; exit 1; }
          # Rename so the download filename communicates the version.
          # We drop the "-debug" suffix on the public-facing artefact
          # because the only practical difference vs a release APK is
          # the signing keystore (see comment on the Build step), and
          # the suffix would just confuse users into thinking they're
          # downloading an unfinished build.
          dst="penflow-android-${GITHUB_REF_NAME:-dev}.apk"
          cp "$src" "$dst"
          size=$(stat -c%s "$dst")
          echo "path=$dst"        >> "$GITHUB_OUTPUT"
          echo "name=$dst"        >> "$GITHUB_OUTPUT"
          echo "size=$size"       >> "$GITHUB_OUTPUT"
          echo "Built $dst ($((size / 1024 / 1024)) MiB)"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          draft: true
          # Don't regenerate notes — the MSI job already did. Setting
          # this to false keeps softprops from clobbering them.
          generate_release_notes: false
          fail_on_unmatched_files: true
